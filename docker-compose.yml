version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vagoneteiros-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vagoneteiros_db
    volumes:
      - vagoneteiros-pgdata:/var/lib/postgresql/data

volumes:
  vagoneteiros-pgdata:
    name: vagoneteiros-pgdata
    external: true
